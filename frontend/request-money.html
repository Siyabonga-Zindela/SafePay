<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePay Connect - Request Money</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/global-styles.css">
</head>
<body>

    <div class="mobile-container">

        <div class="app-header">
    <a href="select-recipient.html?mode=request" class="back-link">
        <i class="material-icons back-arrow">arrow_back_ios</i>
    </a>
    <h2>Request Money</h2>
</div>

        <div class="form-content">

            <div class="input-group">
                <span class="field-label">Select Person</span>
                <a href="select-recipient.html" style="text-decoration: none; color: inherit;">
                    <div class="recipient-display-box">
                        <div id="personInitials" class="profile-circle circle-purple">SZ</div>
                        <div class="profile-details">
                            <h3 id="personName">Siyabonga Z.</h3>
                            <p id="personEmail">siyabonga.z@email.com</p>
                        </div>
                        <span class="right-chevron">&#10095;</span>
                    </div>
                </a>
            </div>

            <div class="input-group">
                <label class="field-label" for="amountInput">Amount</label>
                <div class="currency-input-wrapper">
                    <span class="currency-unit">R</span>
                    <input type="number" id="amountInput" class="input-field amount-padding" value="500.00" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label class="field-label" for="reasonInput">Reason</label>
                <input type="text" id="reasonInput" class="input-field" value="Transport">
            </div>

            <button id="requestButton" class="submit-button">Send Request</button>
        </div>
    </div>

    <script src="./js/send-money.js"></script>
    
</body>
</html>
