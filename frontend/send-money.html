<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePay Connect - Send Money</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #254EDB;       
            --bg-light: #F8FAFC;           
            --text-dark: #1E293B;          
            --border-color: #E2E8F0;       
            --placeholder-color: #94A3B8;  
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #CBD5E1;     
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;       
            align-items: center;           
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 375px;        
            height: 667px;           
            background-color: var(--bg-light);
            border-radius: 32px;     
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2); 
            overflow: hidden;        
            display: flex;
            flex-direction: column;  
            box-sizing: border-box;
        }

        .app-header {
            display: flex;
            align-items: center;       
            padding: 24px 20px 16px 20px;
            background-color: #FFFFFF; 
            border-bottom: 1px solid var(--border-color);
        }

        .back-link {
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            margin-right: 16px;
        }

        .back-arrow {
            font-size: 20px;
            cursor: pointer;   
        }

        .app-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0;                  
        }

        .form-content {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-grow: 1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: #64748B;
        }

        .recipient-display-box {
            display: flex;
            align-items: center;
            background-color: #FFFFFF;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .profile-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            margin-right: 12px;
        }

        /* Initial colors synced with select page */
        .circle-blue { background-color: #E2E8F0; color: var(--primary-blue); }
        .circle-purple { background-color: #F3E8FF; color: #7C3AED; }
        .circle-green { background-color: #DCFCE7; color: #15803D; }

        .profile-details {
            flex-grow: 1;
        }

        .profile-details h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0;
        }

        .profile-details p {
            font-size: 12px;
            color: #64748B;
            margin: 2px 0 0 0;
        }

        .right-chevron {
            color: var(--placeholder-color);
            font-size: 14px;
        }

        .currency-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-unit {
            position: absolute;
            left: 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .input-field {
            width: 100%;
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            color: var(--text-dark);
            box-sizing: border-box;
            outline: none;
            font-family: 'Manrope', sans-serif;
        }

        .amount-padding {
            padding-left: 36px;
            font-weight: 600;
        }

        .input-field:focus {
            border-color: var(--primary-blue);
        }

        .submit-button {
            background-color: var(--primary-blue);
            color: #FFFFFF;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
            font-family: 'Manrope', sans-serif;
            transition: background-color 0.2s;
        }

        .submit-button:hover {
            background-color: #1E40AF;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <div class="app-header">
            <a href="select-recipient.html" class="back-link">
                <i class="material-icons back-arrow">arrow_back_ios</i>
            </a>
            <h2>Send Money</h2>
        </div>

        <div class="form-content">
            
            <div class="input-group">
                <span class="field-label">Select Recipient</span>
                <a href="select-recipient.html" style="text-decoration: none; color: inherit;">
                    <div class="recipient-display-box">
                        <div id="recipientInitials" class="profile-circle circle-blue">LM</div>
                        <div class="profile-details">
                            <h3 id="recipientName">Lerato M.</h3>
                            <p id="recipientEmail">lerato.m@email.com</p>
                        </div>
                        <span class="right-chevron">&#10095;</span>
                    </div>
                </a>
            </div>

            <div class="input-group">
                <label class="field-label" for="amountInput">Amount</label>
                <div class="currency-input-wrapper">
                    <span class="currency-unit">R</span>
                    <input type="number" id="amountInput" class="input-field amount-padding" value="250.00" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label class="field-label" for="messageInput">Message (optional)</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="text" id="messageInput" class="input-field" value="For lunch" style="padding-right: 40px;">
                    <i class="material-icons" style="position: absolute; right: 16px; color: #94A3B8; font-size: 20px;">restaurant</i>
                </div>
            </div>

            <button id="reviewButton" class="submit-button">Review Transfer</button>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const savedRecipient = localStorage.getItem('chosenRecipient');
            
            if (savedRecipient) {
                const recipient = JSON.parse(savedRecipient);
                
                // Swap Text UI
                document.getElementById('recipientName').textContent = recipient.name;
                document.getElementById('recipientEmail').textContent = recipient.email;
                document.getElementById('recipientInitials').textContent = recipient.initials;
                
                // Keep UI colors completely dynamic
                const initialCircle = document.getElementById('recipientInitials');
                initialCircle.className = `profile-circle ${recipient.color}`;
            }
        });

        document.getElementById('reviewButton').addEventListener('click', function() {
            const amount = document.getElementById('amountInput').value;
            if(!amount || amount <= 0) {
                alert('Please enter a valid amount to send.');
                return;
            }
            alert(`Review processing for R ${amount}`);
        });
    </script>
</body>
</html>
