<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePay - Verify Proof</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="./css/global-styles.css">
</head>
<body>

    <div class="mobile-container" style="padding-bottom: 80px;">

        <div class="app-header" style="display: flex; align-items: center; gap: 12px;">
            <a href="dashboard.html" style="color: var(--text-dark); text-decoration: none;">
                <i class="material-icons" style="font-size: 24px; cursor: pointer;">arrow_back</i>
            </a>
            <h2 style="font-size: 18px; margin: 0;">Verify Proof of Payment</h2>
        </div>

        <div class="form-content" style="display: flex; flex-direction: column; height: 100%; justify-content: space-between; padding: 0 20px;">
            
            <div class="upload-section" style="margin-top: 10px;">
                <p class="field-label" style="margin-bottom: 16px; font-weight: 600; font-size: 14px; color: var(--text-dark);">Upload Proof Image</p>
                
                <div class="upload-preview-container">
                    <div class="receipt-preview-card">
                        
                        <div class="receipt-success-badge">
                            <i class="material-icons">check_circle</i>
                            <span>Payment Successful</span>
                        </div>
                        
                        <div class="receipt-row-meta">
                            <label>From</label>
                            <strong>Thabo M.</strong>
                        </div>
                        
                        <div class="receipt-row-meta">
                            <label>To</label>
                            <strong>Lerato M.</strong>
                        </div>
                        
                        <div class="receipt-row-meta">
                            <label>Amount</label>
                            <strong class="receipt-highlight-amount">R 500.00</strong>
                        </div>
                        
                        <div class="receipt-row-meta">
                            <label>Reference</label>
                            <strong>FT2435G6H</strong>
                        </div>
                        
                        <div class="receipt-row-meta" style="border-bottom: none; padding-bottom: 0;">
                            <label>Date</label>
                            <strong>12 May 2026, 10:45</strong>
                        </div>
                    </div>
                </div>
                
                <p class="interaction-hint-text">Tap to change image</p>
            </div>

            <button class="submit-button" style="width: 100%; margin-top: 40px; margin-bottom: 20px;">Verify Proof</button>

        </div>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="material-icons">home</i>
                <span>Home</span>
            </a>
            <a href="requests-list.html" class="nav-item">
                <i class="material-icons">swap_horiz</i>
                <span>Requests</span>
            </a>
            <a href="scan-scam.html" class="nav-item">
                <i class="material-icons">qr_code_scanner</i>
                <span>Scan</span>
            </a>
            <a href="wallet.html" class="nav-item">
                <i class="material-icons">account_balance_wallet</i>
                <span>Wallet</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="material-icons">person</i>
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <script src="./js/js/verify.js"></script>

</body>
</html>
